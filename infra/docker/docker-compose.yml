version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: bestsimilar_postgres
    environment:
      POSTGRES_DB: bestsimilar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bestsimilar_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bestsimilar_redis
    ports:
      - "6379:6379"

volumes:
  bestsimilar_postgres_data:
